<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="icon.png">
<title>Track</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

<style>
body {
  background:#121212;
  color:white;
  text-align:center;
}

.cover {
  width: min(90vw, 420px);
  border-radius:16px;
  margin-top:40px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#waveform {
  margin-top:40px;
}

.back {
  position:absolute;
  left:20px;
  top:20px;
}

#playBtn img {
  width: 24px;
  height: 24px;
}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a href="index.html" class="btn btn-outline-light">
    <img src="back.png" alt="Back" width="24px" height="24px"/>
  </a>

  <span class="navbar-brand mx-auto"></span>

  <div style="width:80px;"></div>
</nav>

<div class="container">

  <img id="cover" class="cover">

  <h2 id="title" class="mt-4"></h2>
  <p id="artist" style="color:#aaa;"></p>

  <div id="waveform"></div>
  <div id="timeDisplay">0:00 / 0:00</div>

  <button id="playBtn" class="btn btn-light mt-4">
    <img src="play.png" alt="▶" />
  </button>

</div>

<script>
const trackId = window.location.pathname.slice(1);

const cover = document.getElementById("cover")
const title = document.getElementById("title")
const artist = document.getElementById("artist")
const playBtn = document.getElementById("playBtn")
const timeDisplay = document.getElementById("timeDisplay")

let totalDuration = 0

// Waveform player
const wavesurfer = WaveSurfer.create({
  container: "#waveform",
  waveColor: "#555",
  progressColor: "#ff4400",
  height: 120
});


fetch("/api/library")
.then(r=>r.json())
.then(tracks=>{

  const track = tracks.find(t=>t.id===trackId)

  if(!track){
    document.body.innerHTML="Track not found"
    return
  }

  cover.src = track.image_source

  title.innerText = track.title
  artist.innerText = track.artist

  const audioUrl = "/" + track.file
  const waveformUrl = "/waveforms/" + track.id + ".mp3.json"

  Promise.all([
    fetch(waveformUrl).then(r=>r.json())
  ])
  .then(([peaks])=>{

    wavesurfer.load(audioUrl, peaks.data)

  })
  document.title = track.title
})

playBtn.addEventListener("click", () => {
  wavesurfer.playPause();

  playBtn.innerHTML = 
  wavesurfer.isPlaying() ? '<img src="pause.png" alt="⏸" />' : '<img src="play.png" alt="▶" />';
});

wavesurfer.on("finish", () => {
  playBtn.innerHTML = '<img src="play.png" alt="▶" />';
});

wavesurfer.on("ready", () => {
  totalDuration = wavesurfer.getDuration();
  updateTime();
});

wavesurfer.on("audioprocess", updateTime);
wavesurfer.on("seek", updateTime);

function updateTime() {
  const current = formatTime(wavesurfer.getCurrentTime());
  const total = formatTime(totalDuration);
  timeDisplay.innerText = `${current} / ${total}`;
}

function formatTime(sec) {
  if (!sec) return "0:00";
  const minutes = Math.floor(sec / 60);
  const seconds = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${minutes}:${seconds}`;
}
</script>

</body>
</html>
