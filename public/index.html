<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schmoundcloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="icon.png">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jsmediatags -->
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>

<!-- WaveSurfer -->
<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

<style>
body {
  background: #121212;
  color: white;
}

.track-card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
  cursor: pointer;
}

.track-card img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  background: #333;
}

.track-info {
  flex-grow: 1;
}

.track-title {
  font-weight: 600;
}

.track-artist {
  font-size: 0.9rem;
  color: #aaa;
}

.container {
  padding-bottom: 160px;
}
</style>
</head>
<body>

<div class="container py-4">
<h1 class="text-center mb-4">Tracks</h1>

<div id="trackList"></div>
</div>

<script>

const trackList = document.getElementById("trackList");

// Build UI automatically from metadata
fetch("/api/library")
  .then(r => r.json())
  .then(tracks => {

    tracks.forEach(track => {

      createTrackCard(
        track.file,
        track.title,
        track.artist,
        track.image_source,
        formatTime(track.duration)
      );

    });

  });


function createTrackCard(file, title, artist, image_source, duration) {

  let card = document.createElement("div");
  card.className = "track-card d-flex align-items-center";

  card.innerHTML = `
    <img src="${image_source || ''}">
    <div class="track-info ms-3">
      <div class="track-title">${title}</div>
      <div class="track-artist">${artist}</div>
      <div class="track-info">${duration}</div>
    </div>
  `;

  card.onclick = () => {
    window.location.href = `/${track.id}`;
  };

  trackList.appendChild(card);
}

function formatTime(sec) {
  if (!sec) return "0:00";
  const minutes = Math.floor(sec / 60);
  const seconds = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${minutes}:${seconds}`;
}

</script>

</body>
</html>
